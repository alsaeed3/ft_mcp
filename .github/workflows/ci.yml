name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package (with dev + http extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,http]"

      - name: Verify stdout purity contract (no MCP SDK, no print to stdout)
        run: |
          ! grep -rnE "import (mcp|modelcontextprotocol)|from (mcp|modelcontextprotocol)" ft_mcp/
          ! grep -rn "print(" ft_mcp/

      - name: Run protocol compliance suite
        run: python -m pytest -q
